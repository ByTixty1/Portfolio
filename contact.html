                <!-- Contact Form (FormSubmit) -->
                <section>
                    <h2>Contact Me</h2>
                    <form class="contact-form" action="https://formsubmit.co/ali.alghamdi.ps@gmail.com" method="POST">
                        <!-- FormSubmit config -->
                        <input type="hidden" name="_subject" value="New Portfolio Contact Message" />
                        <input type="hidden" name="_captcha" value="false" />
                        <input type="hidden" name="_next" value="https://bytixty1.github.io/Portfolio/contact.html" />
                        <input type="text" name="_honey" style="display:none" />

                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" placeholder="Your name" required />
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="your@email.com" required />
                        </div>

                        <div class="form-group">
                            <label for="type">Type</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="type" value="Inquiry" checked /> Inquiry
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="type" value="Feedback" /> Feedback
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" placeholder="Write your message..."
                                required></textarea>
                        </div>

                        <button type="submit" class="btn-submit">Send Message</button>
                    </form>
                </section>
